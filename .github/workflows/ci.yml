name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: python -m pip install -e ".[test,pdf]"
      - name: Build portable current-architecture fixture
        run: python scripts/ci_acceptance.py setup --root .ci-vault --output artifacts/fixture.json
      - name: Pytest
        run: python -m pytest --junitxml=artifacts/pytest.xml
      - name: Doctor
        if: always()
        run: python -m global_memory.cli --root .ci-vault doctor > artifacts/doctor.json
      - name: Schema validation
        if: always()
        run: python -m global_memory.cli --root .ci-vault lint > artifacts/schema-validation.json
      - name: State consistency
        if: always()
        run: python -m global_memory.cli --root .ci-vault doctor --check-state > artifacts/state-consistency.json
      - name: Raw integrity
        if: always()
        run: python -m global_memory.cli --root .ci-vault raw verify > artifacts/raw-integrity.json
      - name: Migration dry-run
        if: always()
        run: |
          python -m global_memory.cli --root .ci-vault migrate raw-store --dry-run > artifacts/migration-raw.json
          python -m global_memory.cli --root .ci-vault migrate batch-artifacts --dry-run > artifacts/migration-batch.json
          python -m global_memory.cli --root .ci-vault migrate proposal-gate-to-promotion --dry-run > artifacts/migration-promotion-gate.json
      - name: Historical fixture acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m6_ or m61_" --junitxml=artifacts/historical-fixtures.xml
      - name: Current architecture acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m7_" --junitxml=artifacts/current-architecture.xml
      - name: Migration acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m7_migration" --junitxml=artifacts/migration-acceptance.xml
      - name: Promotion policy validation
        if: always()
        run: python scripts/ci_acceptance.py promotion --root .ci-vault --output artifacts/promotion.json
      - name: Weekly consolidation fixture
        if: always()
        run: python scripts/ci_acceptance.py weekly --root .ci-vault --output artifacts/weekly.json
      - name: Incremental evolution acceptance
        if: always()
        run: python scripts/ci_acceptance.py incremental --root .ci-vault --output artifacts/incremental-evolution.json
      - name: Drift audit fixture
        if: always()
        run: python scripts/ci_acceptance.py drift --root .ci-vault --output artifacts/drift-audit.json
      - name: Context truth-layer validation
        if: always()
        run: python scripts/ci_acceptance.py context --root .ci-vault --output artifacts/context-truth-layer.json
      - name: Upload acceptance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-${{ matrix.os }}-py${{ matrix.python }}
          path: artifacts/
          if-no-files-found: warn
