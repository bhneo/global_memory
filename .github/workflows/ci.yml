name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: python -m pip install -e ".[test,pdf]"
      - name: Build portable current-architecture fixture
        run: python scripts/ci_acceptance.py setup --root .ci-vault --output artifacts/fixture.json
      - name: Pytest
        run: python -m pytest --junitxml=artifacts/pytest.xml
      - name: Doctor
        if: always()
        run: python -m global_memory.cli --root .ci-vault doctor > artifacts/doctor.json
      - name: Schema validation
        if: always()
        run: python -m global_memory.cli --root .ci-vault lint > artifacts/schema-validation.json
      - name: State consistency
        if: always()
        run: python -m global_memory.cli --root .ci-vault doctor --check-state > artifacts/state-consistency.json
      - name: Raw integrity
        if: always()
        run: python -m global_memory.cli --root .ci-vault raw verify > artifacts/raw-integrity.json
      - name: Migration dry-run
        if: always()
        run: |
          python -m global_memory.cli --root .ci-vault migrate raw-store --dry-run > artifacts/migration-raw.json
          python -m global_memory.cli --root .ci-vault migrate batch-artifacts --dry-run > artifacts/migration-batch.json
          python -m global_memory.cli --root .ci-vault migrate proposal-gate-to-promotion --dry-run > artifacts/migration-promotion-gate.json
          python -m global_memory.cli --root .ci-vault migrate epistemic-status --dry-run > artifacts/migration-epistemic-status.json
          python -m global_memory.cli --root .ci-vault migrate trust-requalification --dry-run > artifacts/migration-trust-requalification.json
          python -m global_memory.cli --root .ci-vault migrate repair-trust-requalification --dry-run > artifacts/migration-requalification-repair.json
      - name: Historical fixture acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m6_ or m61_" --junitxml=artifacts/historical-fixtures.xml
      - name: Current architecture acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m7_" --junitxml=artifacts/current-architecture.xml
      - name: Migration acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m7_migration or m8_drift_migration_and_generated_metrics" --junitxml=artifacts/migration-acceptance.xml
      - name: M8 governance acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m8_" --junitxml=artifacts/m8-governance.xml
      - name: M8.1.1 correctness recovery acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "receipt_v1 or receipt_v2 or requalification or governed_recovery or canonical_evolution or external_provider_update" --junitxml=artifacts/m811-correctness-recovery.xml
      - name: Research annotation acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m90_research_annotation or m90_annotation_rejects" --junitxml=artifacts/research-annotation.xml
      - name: Connection feedback acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m90_connection_feedback" --junitxml=artifacts/connection-feedback.xml
      - name: Research router acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m90_router or m90_context_is_read_only" --junitxml=artifacts/research-router.xml
      - name: Activation no-trust-side-effect acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m90_activation" --junitxml=artifacts/activation-no-trust-side-effect.xml
      - name: Research digest acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m90_research_digest" --junitxml=artifacts/research-digest.xml
      - name: Research derived-view acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m90_research_digest_and_map" --junitxml=artifacts/research-derived-view.xml
      - name: M9.0.1 quality-closure acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "weekly_excludes_archived or source_only_status or daily_keeps_unmarked_web or annotation_active_history or working_quality_migration" --junitxml=artifacts/m901-quality-closure.xml
      - name: M9.1 cognitive-consolidation acceptance
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "idea_capture or article_reflection or reflection_quality or conversation_and_agent or daily_dream or weekly_dream or weekly_hypothesis or cognitive_synthesis_identity or research_context_includes_reflection or cognitive_cli" --junitxml=artifacts/m91-cognitive-consolidation.xml
      - name: M8 trust-boundary regression
        if: always()
        run: python -m pytest tests/test_global_memory.py -k "m8_ or receipt_v2 or governed_recovery or canonical_evolution" --junitxml=artifacts/m8-trust-boundary-regression.xml
      - name: M9 synthetic research scenario
        if: always()
        run: python scripts/m9_acceptance_demo.py --root .ci-m9-vault --output artifacts/m9-research-scenario.json
      - name: M9.1 cognitive consolidation scenario
        if: always()
        run: python scripts/m91_acceptance_demo.py --root .ci-m91-vault --output artifacts/m91-cognitive-scenario.json
      - name: Promotion policy validation
        if: always()
        run: python scripts/ci_acceptance.py promotion --root .ci-vault --output artifacts/promotion.json
      - name: Weekly consolidation fixture
        if: always()
        run: python scripts/ci_acceptance.py weekly --root .ci-vault --output artifacts/weekly.json
      - name: Incremental evolution acceptance
        if: always()
        run: python scripts/ci_acceptance.py incremental --root .ci-vault --output artifacts/incremental-evolution.json
      - name: Drift audit fixture
        if: always()
        run: python scripts/ci_acceptance.py drift --root .ci-vault --output artifacts/drift-audit.json
      - name: Context truth-layer validation
        if: always()
        run: python scripts/ci_acceptance.py context --root .ci-vault --output artifacts/context-truth-layer.json
      - name: Upload acceptance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-${{ matrix.os }}-py${{ matrix.python }}
          path: artifacts/
          if-no-files-found: warn
