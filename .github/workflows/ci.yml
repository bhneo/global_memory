name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: python -m pip install -e ".[test,pdf]"
      - name: Tests
        run: python -m pytest
      - name: Empty-vault schema and operations
        shell: bash
        run: |
          python -m global_memory.cli --root .ci-vault init
          python -m global_memory.cli --root .ci-vault doctor
          python -m global_memory.cli --root .ci-vault lint
          python -m global_memory.cli --root .ci-vault raw verify
          python -m global_memory.cli --root .ci-vault migrate raw-store --dry-run
      - name: M5 acceptance smoke
        run: python scripts/m5_acceptance_demo.py
      - name: M6 governance and real-corpus acceptance
        run: |
          python -m global_memory.cli --root . doctor
          python -m global_memory.cli --root . lint
          python -m global_memory.cli --root . raw verify
          python -m global_memory.cli --root . migrate raw-store --dry-run
          python -m global_memory.cli --root . migrate batch-artifacts --dry-run
          python scripts/m6_acceptance_demo.py --root .
